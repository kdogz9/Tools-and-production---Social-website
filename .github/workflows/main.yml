name: Generate JSDoc Artifacts

on:
  push:
    branches: ["main"]
  workflow_dispatch: # This allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Global Install JSDoc
        # Installs JSDoc globally on the runner since there is no package.json
        run: npm install -g jsdoc

      - name: Generate HTML
        # Uses your config to parse script.js into the ./docs folder
        run: jsdoc -c jsdoc.json ./script.js

      - name: Save Documentation as Artifact
        # This takes the generated folder and makes it a downloadable zip
        uses: actions/upload-artifact@v4
        with:
          name: jsdoc-documentation
          path: ./docs/
          retention-days: 5
